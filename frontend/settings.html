<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PicaDownload - 设置</title>
<link rel="stylesheet" href="css/theme.css?v=4">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="topbar">
  <h1><span style="color:#000;font-weight:800;font-size:1.4em">Pica</span><span style="color:#fff;font-weight:800;font-size:1.4em">Download</span></h1>
  <nav id="topnav"></nav>
  <span style="flex:1"></span>
  <span id="searchWrap" style="display:flex;align-items:center"></span>
  <span id="tokenStatus" style="font-size:.75em;color:#666;white-space:nowrap;margin-left:12px"></span>
</div>

<div class="container" id="app">
  <div class="loading">加载中...</div>
</div>

<script src="js/common.js?v=19"></script>
<script>async function renderSettings() {

const app = document.getElementById('app');
renderTopbar('settings.html');
  const cfg = await fetchJSON(`${API}/config`);
  const blurOn = _loadState('blur', {on: false}).on;
  const fields = [
    {key:'token',label:'Token (JWT)',type:'password',ph:'修改时输入新值'},
    {key:'nonce',label:'Nonce (32位)',type:'text',ph:'修改时输入新值'},
    {key:'proxy',label:'代理地址',type:'text',ph:'http://127.0.0.1:7890'},
    {key:'api_base',label:'API 地址',type:'text',ph:'https://picaapi.go2778.com'},
    {key:'image_proxy_domain',label:'图片代理域名',type:'text',ph:'go2778.com'},
    {key:'page_concurrency',label:'图片并发数',type:'number',ph:'3'},
    {key:'chapter_concurrency',label:'章节并发数',type:'number',ph:'3'},
    {key:'comic_concurrency',label:'漫画并发数',type:'number',ph:'1 (同时下几部)'},
    {key:'max_retries',label:'最大重试次数',type:'number',ph:'3'},
    {key:'download_dir',label:'下载目录',type:'text',ph:'comics_detail'},
    {key:'embedding_api_key',label:'Embedding API Key',type:'password',ph:'sk-...'},
    {key:'embedding_api_base',label:'Embedding API 地址',type:'text',ph:'https://dashscope.aliyuncs.com/compatible-mode/v1'},
  ];

  app.innerHTML = `
    <h2 style="margin-bottom:20px"><svg style="width:1.2em;height:1.2em;vertical-align:-.2em;margin-right:4px" viewBox="0 0 512 512"><path d="M504 255.531c.253 136.64-111.18 248.372-247.82 248.468-59.015.042-113.223-20.53-155.822-54.911-11.077-8.94-11.905-25.541-1.839-35.607l11.267-11.267c8.609-8.609 22.353-9.551 31.891-1.984C173.062 425.135 212.781 440 256 440c101.705 0 184-82.311 184-184 0-101.705-82.311-184-184-184-48.814 0-93.149 18.969-126.068 49.932l50.754 50.754c10.08 10.08 2.941 27.314-11.313 27.314H24c-8.837 0-16-7.163-16-16V38.627c0-14.254 17.234-21.393 27.314-11.314l49.372 49.372C129.209 34.136 189.552 8 256 8c136.81 0 247.747 110.78 248 247.531zm-180.912 78.784l9.823-12.63c8.138-10.463 6.253-25.542-4.21-33.679L288 256.349V152c0-13.255-10.745-24-24-24h-16c-13.255 0-24 10.745-24 24v135.651l65.409 50.874c10.463 8.137 25.541 6.253 33.679-4.21z" fill="#fff"/></svg>设置</h2>

    <!-- 登录区域 -->
    <div style="max-width:640px;background:#1a1a1a;border-radius:8px;padding:16px;margin-bottom:24px;border:1px solid #2a2a2a">
      <h3 style="margin:0 0 12px;font-size:1em">账号登录</h3>
      <div style="display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap">
        <div style="flex:1;min-width:140px">
          <label style="color:#aaa;font-size:.75em">邮箱</label>
          <input id="loginEmail" type="text" placeholder="your@email.com"
            style="width:100%;padding:8px 10px;border:1px solid #333;border-radius:6px;background:#111;color:#ddd;font-size:.85em;margin-top:2px">
        </div>
        <div style="flex:1;min-width:140px">
          <label style="color:#aaa;font-size:.75em">密码</label>
          <input id="loginPass" type="password" placeholder="输入密码"
            style="width:100%;padding:8px 10px;border:1px solid #333;border-radius:6px;background:#111;color:#ddd;font-size:.85em;margin-top:2px">
        </div>
        <div style="display:flex;gap:8px">
          <button type="button" id="btnLogin" class="btn btn-primary" style="font-size:.85em;padding:8px 16px">登录</button>
          <button type="button" id="btnLogout" class="btn" style="background:#333;color:#f87171;font-size:.85em;padding:8px 16px">退出登录</button>
        </div>
      </div>
      <div id="loginResult" style="margin-top:8px;font-size:.8em"></div>
    </div>

    <div style="max-width:640px;margin-bottom:20px">
      <label style="color:#aaa;font-size:.85em;cursor:pointer;display:flex;align-items:center;gap:6px">
        <input type="checkbox" id="chkBlur" ${blurOn?'checked':''} onchange="_saveState('blur',{on:this.checked});location.reload()">
        🌫 模糊模式（不加载图片，方便测试）
      </label>
      <label style="color:#aaa;font-size:.85em;cursor:pointer;display:flex;align-items:center;gap:6px;margin-top:8px">
        <input type="checkbox" id="chkSimilar" ${cfg.similar_enabled!==false?'checked':''} onchange="toggleSimilar(this.checked)">
        启用相似推荐
      </label>
      <div style="margin-top:12px">
        <label style="color:#aaa;font-size:.85em">🎨 界面风格</label>
        <select id="selTheme" onchange="changeTheme(this.value)" style="width:100%;margin-top:4px;padding:8px 12px;border:1px solid #333;border-radius:6px;background:#1a1a1a;color:#ddd;font-size:.9em">
          <option value="">默认黑色</option>
          <option value="picaweb">PicaWeb 风格</option>
        </select>
      </div>
      <div style="margin-top:12px">
        <label style="color:#aaa;font-size:.85em">🖼 图片画质</label>
        <select id="selQuality" style="width:100%;margin-top:4px;padding:8px 12px;border:1px solid #333;border-radius:6px;background:#1a1a1a;color:#ddd;font-size:.9em">
          <option value="standard">标准 (缩略图质量)</option>
          <option value="original">原画 (原始质量)</option>
        </select>
      </div>
    </div>
    <form id="settingsForm" style="max-width:640px">
      ${fields.map(f => `
        <div style="margin-bottom:16px">
          <label style="display:block;color:#aaa;font-size:.85em;margin-bottom:4px">${f.label}</label>
          <input name="${f.key}" type="${f.type}" placeholder="${f.ph}" value="${cfg[f.key]||''}"
            style="width:100%;padding:10px 12px;border:1px solid #333;border-radius:6px;background:#1a1a1a;color:#ddd;font-size:.9em">
          ${f.key === 'token' ? '<div style="margin-top:6px;display:flex;gap:6px;align-items:center"><button type="button" id="btnTestToken" class="btn" style="background:#333;color:#ddd;font-size:.8em;padding:6px 14px">🔑 检查</button><button type="button" id="btnRefreshToken" class="btn" style="background:#333;color:#fbbf24;font-size:.8em;padding:6px 14px"><svg style="width:14px;height:14px;vertical-align:-2px;margin-right:2px" viewBox="0 0 512 512"><path d="M504 255.531c.253 136.64-111.18 248.372-247.82 248.468-59.015.042-113.223-20.53-155.822-54.911-11.077-8.94-11.905-25.541-1.839-35.607l11.267-11.267c8.609-8.609 22.353-9.551 31.891-1.984C173.062 425.135 212.781 440 256 440c101.705 0 184-82.311 184-184 0-101.705-82.311-184-184-184-48.814 0-93.149 18.969-126.068 49.932l50.754 50.754c10.08 10.08 2.941 27.314-11.313 27.314H24c-8.837 0-16-7.163-16-16V38.627c0-14.254 17.234-21.393 27.314-11.314l49.372 49.372C129.209 34.136 189.552 8 256 8c136.81 0 247.747 110.78 248 247.531zm-180.912 78.784l9.823-12.63c8.138-10.463 6.253-25.542-4.21-33.679L288 256.349V152c0-13.255-10.745-24-24-24h-16c-13.255 0-24 10.745-24 24v135.651l65.409 50.874c10.463 8.137 25.541 6.253 33.679-4.21z" fill="currentColor"/></svg>刷新</button><span id="tokenResult" style="margin-left:6px;font-size:.8em"></span></div>' : ''}
          ${f.key === 'download_dir' ? '<button type="button" class="btnPickDir btn" style="background:#333;color:#ddd;margin-top:6px;font-size:.8em;padding:6px 14px" data-target="'+f.key+'">📂 浏览...</button>' : ''}
          ${f.key === 'comic_concurrency' ? '<div style="margin-top:4px;color:#fbbf24;font-size:.75em">⚠ 过高的并发数会对官网造成压力，且章节和漫画并发数调大后可能导致下载速度变慢</div>' : ''}
        </div>
      `).join('')}
      <button type="submit" class="btn btn-primary" style="margin-top:8px">💾 保存设置</button>
      <span id="saveMsg" style="margin-left:12px;color:#4ade80;font-size:.85em;display:none">已保存</span>
    </form>

    <div id="vectorSync" style="max-width:640px;margin-top:24px;background:#1a1a1a;border-radius:8px;padding:16px;border:1px solid #2a2a2a">
      <h3 style="margin:0 0 12px;font-size:1em">相似推荐向量库</h3>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <button type="button" id="btnVectorSync" class="btn" style="background:#333;color:#fbbf24;font-size:.85em;padding:8px 16px"><svg style="width:14px;height:14px;vertical-align:-2px;margin-right:2px" viewBox="0 0 512 512"><path d="M504 255.531c.253 136.64-111.18 248.372-247.82 248.468-59.015.042-113.223-20.53-155.822-54.911-11.077-8.94-11.905-25.541-1.839-35.607l11.267-11.267c8.609-8.609 22.353-9.551 31.891-1.984C173.062 425.135 212.781 440 256 440c101.705 0 184-82.311 184-184 0-101.705-82.311-184-184-184-48.814 0-93.149 18.969-126.068 49.932l50.754 50.754c10.08 10.08 2.941 27.314-11.313 27.314H24c-8.837 0-16-7.163-16-16V38.627c0-14.254 17.234-21.393 27.314-11.314l49.372 49.372C129.209 34.136 189.552 8 256 8c136.81 0 247.747 110.78 248 247.531zm-180.912 78.784l9.823-12.63c8.138-10.463 6.253-25.542-4.21-33.679L288 256.349V152c0-13.255-10.745-24-24-24h-16c-13.255 0-24 10.745-24 24v135.651l65.409 50.874c10.463 8.137 25.541 6.253 33.679-4.21z" fill="currentColor"/></svg>更新向量数据库</button>
        <button type="button" id="btnVectorCheck" class="btn" style="background:#333;color:#60a5fa;font-size:.85em;padding:8px 16px"><svg style="width:14px;height:14px;vertical-align:-2px;margin-right:2px" viewBox="0 0 576 512"><path d="M572.52 241.4C518.29 135.59 410.93 64 288 64S57.68 135.64 3.48 241.41a32.35 32.35 0 0 0 0 29.19C57.71 376.41 165.07 448 288 448s230.32-71.64 284.52-177.41a32.35 32.35 0 0 0 0-29.19zM288 400a144 144 0 1 1 144-144 143.93 143.93 0 0 1-144 144zm0-240a95.31 95.31 0 0 0-25.31 3.79 47.85 47.85 0 0 1-66.9 66.9A95.78 95.78 0 1 0 288 160z" fill="currentColor"/></svg>查看数量</button>
        <button type="button" id="btnVectorClear" class="btn" style="background:#333;color:#f87171;font-size:.85em;padding:8px 16px">🗑 清除向量库</button>
        <span id="vectorSyncMsg" style="font-size:.8em;color:#888"></span>
      </div>
    </div>
  `;

  document.getElementById('settingsForm').onsubmit = async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const data = {};
    for (const [k,v] of fd) data[k] = v;
    for (const f of fields) {
      if (f.type === 'number' && data[f.key]) data[f.key] = parseFloat(data[f.key]);
    }
    await fetch(`${API}/config`, {
      method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)
    });
    const msg = document.getElementById('saveMsg');
    msg.style.display = 'inline';
    setTimeout(() => msg.style.display = 'none', 2000);
  };

async function toggleSimilar(on) {
    await fetch(`${API}/config`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({similar_enabled: !!on})
    });
  }

  const selTheme = document.getElementById('selTheme');
  if (selTheme) {
    selTheme.value = _loadState('theme', {name:''}).name;
  }

  const selQuality = document.getElementById('selQuality');
  if (selQuality) {
    selQuality.value = cfg.image_quality || 'standard';
    selQuality.onchange = () => { fetch(`${API}/config`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({image_quality: selQuality.value})}); };
  }

  async function saveQuality(val) {
    await fetch(`${API}/config`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({image_quality: val})
    });
  }

  document.getElementById('btnVectorCheck').onclick = async () => {
    const msg = document.getElementById('vectorSyncMsg');
    msg.innerHTML = '<span style="color:#888">查询中...</span>';
    try {
      const r = await fetch(`${API}/similar/stats`);
      const j = await r.json();
      msg.innerHTML = `<span style="color:#60a5fa">向量库共 ${j.vector_count} 部，本地共 ${j.local_count} 部</span>`;
    } catch(e) {
      msg.innerHTML = `<span style="color:#f87171">✗ ${e.message}</span>`;
    }
  };

  document.getElementById('btnVectorClear').onclick = async () => {
    if (!confirm('确定清除向量数据库？清除后需重新同步。')) return;
    const msg = document.getElementById('vectorSyncMsg');
    msg.innerHTML = '<span style="color:#fbbf24">清除中...</span>';
    try {
      const r = await fetch(`${API}/similar/clear`, {method:'POST'});
      const j = await r.json();
      if (j.ok) {
        msg.innerHTML = '<span style="color:#4ade80">✓ 已清除</span>';
      }
    } catch(e) {
      msg.innerHTML = `<span style="color:#f87171">✗ ${e.message}</span>`;
    }
  };

  document.getElementById('btnVectorSync').onclick = async () => {
    const btn = document.getElementById('btnVectorSync');
    const msg = document.getElementById('vectorSyncMsg');
    btn.disabled = true;
    btn.textContent = '同步中...';
    msg.innerHTML = '<span style="color:#fbbf24">正在同步...</span>';

    const es = new EventSource(`${API}/similar/sync/stream`);
    es.onmessage = (e) => {
      const d = JSON.parse(e.data);
      if (d.type === 'log') {
        const text = d.text;
        if (text.startsWith('  [')) {
          msg.innerHTML = `<span style="color:#60a5fa;white-space:pre-wrap;font-family:monospace;font-size:0.85em">${text}</span>`;
        } else {
          msg.innerHTML = `<span style="color:#888">${text}</span>`;
        }
      } else if (d.type === 'result') {
        msg.innerHTML = `<span style="color:#4ade80">✓ ${d.text}</span>`;
      } else if (d.type === 'error') {
        msg.innerHTML = `<span style="color:#f87171">✗ ${d.text}</span>`;
      } else if (d.type === 'done') {
        es.close();
        btn.disabled = false;
        btn.innerHTML = '<svg style="width:14px;height:14px;vertical-align:-2px;margin-right:2px" viewBox="0 0 512 512"><path d="M504 255.531c.253 136.64-111.18 248.372-247.82 248.468-59.015.042-113.223-20.53-155.822-54.911-11.077-8.94-11.905-25.541-1.839-35.607l11.267-11.267c8.609-8.609 22.353-9.551 31.891-1.984C173.062 425.135 212.781 440 256 440c101.705 0 184-82.311 184-184 0-101.705-82.311-184-184-184-48.814 0-93.149 18.969-126.068 49.932l50.754 50.754c10.08 10.08 2.941 27.314-11.313 27.314H24c-8.837 0-16-7.163-16-16V38.627c0-14.254 17.234-21.393 27.314-11.314l49.372 49.372C129.209 34.136 189.552 8 256 8c136.81 0 247.747 110.78 248 247.531zm-180.912 78.784l9.823-12.63c8.138-10.463 6.253-25.542-4.21-33.679L288 256.349V152c0-13.255-10.745-24-24-24h-16c-13.255 0-24 10.745-24 24v135.651l65.409 50.874c10.463 8.137 25.541 6.253 33.679-4.21z" fill="currentColor"/></svg>更新向量数据库';
      }
    };
    es.onerror = () => {
      es.close();
      btn.disabled = false;
      btn.textContent = '<svg style="width:14px;height:14px;vertical-align:-2px;margin-right:2px" viewBox="0 0 512 512"><path d="M504 255.531c.253 136.64-111.18 248.372-247.82 248.468-59.015.042-113.223-20.53-155.822-54.911-11.077-8.94-11.905-25.541-1.839-35.607l11.267-11.267c8.609-8.609 22.353-9.551 31.891-1.984C173.062 425.135 212.781 440 256 440c101.705 0 184-82.311 184-184 0-101.705-82.311-184-184-184-48.814 0-93.149 18.969-126.068 49.932l50.754 50.754c10.08 10.08 2.941 27.314-11.313 27.314H24c-8.837 0-16-7.163-16-16V38.627c0-14.254 17.234-21.393 27.314-11.314l49.372 49.372C129.209 34.136 189.552 8 256 8c136.81 0 247.747 110.78 248 247.531zm-180.912 78.784l9.823-12.63c8.138-10.463 6.253-25.542-4.21-33.679L288 256.349V152c0-13.255-10.745-24-24-24h-16c-13.255 0-24 10.745-24 24v135.651l65.409 50.874c10.463 8.137 25.541 6.253 33.679-4.21z" fill="currentColor"/></svg>更新向量数据库';
    };

    try {
      const r = await fetch(`${API}/similar/sync`, {method:'POST'});
      const j = await r.json();
      if (!j.ok) {
        msg.innerHTML = `<span style="color:#f87171">✗ ${j.detail || '同步失败'}</span>`;
        es.close();
        btn.disabled = false;
        btn.innerHTML = '<svg style="width:14px;height:14px;vertical-align:-2px;margin-right:2px" viewBox="0 0 512 512"><path d="M504 255.531c.253 136.64-111.18 248.372-247.82 248.468-59.015.042-113.223-20.53-155.822-54.911-11.077-8.94-11.905-25.541-1.839-35.607l11.267-11.267c8.609-8.609 22.353-9.551 31.891-1.984C173.062 425.135 212.781 440 256 440c101.705 0 184-82.311 184-184 0-101.705-82.311-184-184-184-48.814 0-93.149 18.969-126.068 49.932l50.754 50.754c10.08 10.08 2.941 27.314-11.313 27.314H24c-8.837 0-16-7.163-16-16V38.627c0-14.254 17.234-21.393 27.314-11.314l49.372 49.372C129.209 34.136 189.552 8 256 8c136.81 0 247.747 110.78 248 247.531zm-180.912 78.784l9.823-12.63c8.138-10.463 6.253-25.542-4.21-33.679L288 256.349V152c0-13.255-10.745-24-24-24h-16c-13.255 0-24 10.745-24 24v135.651l65.409 50.874c10.463 8.137 25.541 6.253 33.679-4.21z" fill="currentColor"/></svg>更新向量数据库';
      }
    } catch(e) {
      msg.innerHTML = `<span style="color:#f87171">✗ ${e.message}</span>`;
      es.close();
      btn.disabled = false;
      btn.textContent = '<svg style="width:14px;height:14px;vertical-align:-2px;margin-right:2px" viewBox="0 0 512 512"><path d="M504 255.531c.253 136.64-111.18 248.372-247.82 248.468-59.015.042-113.223-20.53-155.822-54.911-11.077-8.94-11.905-25.541-1.839-35.607l11.267-11.267c8.609-8.609 22.353-9.551 31.891-1.984C173.062 425.135 212.781 440 256 440c101.705 0 184-82.311 184-184 0-101.705-82.311-184-184-184-48.814 0-93.149 18.969-126.068 49.932l50.754 50.754c10.08 10.08 2.941 27.314-11.313 27.314H24c-8.837 0-16-7.163-16-16V38.627c0-14.254 17.234-21.393 27.314-11.314l49.372 49.372C129.209 34.136 189.552 8 256 8c136.81 0 247.747 110.78 248 247.531zm-180.912 78.784l9.823-12.63c8.138-10.463 6.253-25.542-4.21-33.679L288 256.349V152c0-13.255-10.745-24-24-24h-16c-13.255 0-24 10.745-24 24v135.651l65.409 50.874c10.463 8.137 25.541 6.253 33.679-4.21z" fill="currentColor"/></svg>更新向量数据库';
    }
  };

  try {
    const sr = await fetch(`${API}/similar/stats`);
    const sj = await sr.json();
    const m = document.getElementById('vectorSyncMsg');
    if (sj.vector_count > 0) {
      m.innerHTML = `<span style="color:#4ade80">已索引 ${sj.vector_count} 部</span>`;
    } else {
      m.innerHTML = '<span style="color:#fbbf24">未初始化，请点击更新</span>';
    }
  } catch(e) {}

  // 目录选择器按钮
  document.querySelectorAll('.btnPickDir').forEach(btn => {
    btn.onclick = async () => {
      const target = btn.dataset.target;
      const input = document.querySelector(`[name="${target}"]`);
      const initial = input ? input.value : '';
      btn.disabled = true;
      btn.textContent = '选择中...';
      try {
        const r = await fetch(`${API}/pick-directory`, {
          method:'POST', headers:{'Content-Type':'application/json'},
          body:JSON.stringify({initial})
        });
        const j = await r.json();
        if (j.ok && j.path && input) {
          input.value = j.path;
        }
      } catch(e) {
        // 无操作
      } finally {
        btn.disabled = false;
        btn.textContent = '📂 浏览...';
      }
    };
  });

  document.getElementById('btnTestToken').onclick = async () => {
    const btn = document.getElementById('btnTestToken');
    const res = document.getElementById('tokenResult');
    btn.disabled = true;
    btn.textContent = '检查中...';
    res.innerHTML = '<span style="color:#888">测试中...</span>';
    try {
      const fd = new FormData(document.getElementById('settingsForm'));
      const data = {};
      for (const [k,v] of fd) data[k] = v;
      for (const f of fields) {
        if (f.type === 'number' && data[f.key]) data[f.key] = parseFloat(data[f.key]);
      }
      const r = await fetch(`${API}/config/test-token`, {
        method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)
      });
      const j = await r.json();
      if (j.ok) {
        const cls = j.remaining_hours > 48 ? '#4ade80' : j.remaining_hours > 0 ? '#fbbf24' : '#f87171';
        res.innerHTML = `<span style="color:#4ade80">✓ 有效</span> <span style="color:#888">| ${j.user} | 收藏${j.favourites_total}部 | 过期: ${j.expires} <span style="color:${cls}">(${j.remaining_hours}h)</span></span>`;
      } else {
        res.innerHTML = `<span style="color:#f87171">✗ ${j.error}</span> <span style="color:#888">| 过期: ${j.expires} | 剩余${j.remaining_hours}h</span>`;
      }
    } catch(e) {
      res.innerHTML = `<span style="color:#f87171">请求失败: ${e.message}</span>`;
    } finally {
      btn.disabled = false;
      btn.textContent = '🔑 检查';
    }
  };

  document.getElementById('btnRefreshToken').onclick = async () => {
    const btn = document.getElementById('btnRefreshToken');
    const res = document.getElementById('tokenResult');
    const emailEl = document.getElementById('loginEmail');
    const passEl = document.getElementById('loginPass');
    let email = (emailEl && emailEl.value || '').trim();
    let pass = (passEl && passEl.value || '').trim();

    if (!email) {
      // 从当前 token 解码邮箱
      try {
        const cfg = await fetchJSON(`${API}/config`);
        const token = cfg.token || '';
        if (token && token.includes('.')) {
          const payload = JSON.parse(atob(token.split('.')[1]));
          email = payload.email || '';
          if (emailEl) emailEl.value = email;
        }
      } catch(e) {}
    }

    if (!email) {
      res.innerHTML = '<span style=\"color:#f87171\">无法获取邮箱，请在登录表单中填写</span>';
      return;
    }

    if (!pass) {
      res.innerHTML = '<span style=\"color:#fbbf24\">请输入密码后点击刷新</span>';
      if (passEl) passEl.focus();
      return;
    }

    btn.disabled = true;
    btn.textContent = '刷新中...';
    res.innerHTML = '<span style=\"color:#888\">正在刷新...</span>';

    try {
      const r = await fetch(`${API}/login`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({email, password: pass})
      });
      const j = await r.json();
      if (r.ok && j.ok) {
        res.innerHTML = `<span style=\"color:#4ade80\">✓ 已刷新 — ${j.user}，过期: ${j.expires} (${j.remaining_hours}h)</span>`;
        updateTokenStatus(true);
        setTimeout(() => renderSettings(), 1500);
      } else {
        const err = j.detail || j.error || r.statusText;
        res.innerHTML = `<span style=\"color:#f87171\">✗ ${err}</span>`;
      }
    } catch(e) {
      res.innerHTML = `<span style=\"color:#f87171\">请求失败: ${e.message}</span>`;
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<svg style=\"width:14px;height:14px;vertical-align:-2px;margin-right:2px\" viewBox=\"0 0 512 512\"><path d=\"M504 255.531c.253 136.64-111.18 248.372-247.82 248.468-59.015.042-113.223-20.53-155.822-54.911-11.077-8.94-11.905-25.541-1.839-35.607l11.267-11.267c8.609-8.609 22.353-9.551 31.891-1.984C173.062 425.135 212.781 440 256 440c101.705 0 184-82.311 184-184 0-101.705-82.311-184-184-184-48.814 0-93.149 18.969-126.068 49.932l50.754 50.754c10.08 10.08 2.941 27.314-11.313 27.314H24c-8.837 0-16-7.163-16-16V38.627c0-14.254 17.234-21.393 27.314-11.314l49.372 49.372C129.209 34.136 189.552 8 256 8c136.81 0 247.747 110.78 248 247.531zm-180.912 78.784l9.823-12.63c8.138-10.463 6.253-25.542-4.21-33.679L288 256.349V152c0-13.255-10.745-24-24-24h-16c-13.255 0-24 10.745-24 24v135.651l65.409 50.874c10.463 8.137 25.541 6.253 33.679-4.21z\" fill=\"currentColor\"/></svg>\u5237\u65B0';
    }
  };

  document.getElementById('btnLogin').onclick = async () => {
    const btn = document.getElementById('btnLogin');
    const res = document.getElementById('loginResult');
    const email = document.getElementById('loginEmail').value.trim();
    const pass = document.getElementById('loginPass').value.trim();
    if (!email || !pass) { res.innerHTML = '<span style=\"color:#f87171\">请输入邮箱和密码</span>'; return; }
    btn.disabled = true;
    btn.textContent = '登录中...';
    res.innerHTML = '<span style=\"color:#888\">正在登录...</span>';
    try {
      const r = await fetch(`${API}/login`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({email, password: pass})
      });
      const j = await r.json();
      if (r.ok && j.ok) {
        let html = `<span style=\"color:#4ade80\">✓ 登录成功 — ${j.user} (${j.email})，过期: ${j.expires} (${j.remaining_hours}h)</span>`;
        if (j.debug) html += `<details style=\"margin-top:4px\"><summary style=\"color:#888;font-size:.7em;cursor:pointer\">API 原始响应</summary><pre style=\"color:#888;font-size:.7em;max-height:400px;overflow:auto;background:#111;padding:8px;border-radius:4px;margin-top:4px\">${j.debug}</pre></details>`;
        res.innerHTML = html;
        document.getElementById('loginPass').value = '';
        updateTokenStatus(true);
        setTimeout(() => renderSettings(), 2000);
      } else {
        const err = j.detail || j.error || r.statusText;
        let html = `<span style=\"color:#f87171\">✗ ${err}</span>`;
        if (j.debug) html += `<div style=\"margin-top:4px;color:#888;font-size:.75em;max-height:200px;overflow:auto;white-space:pre-wrap;background:#111;padding:8px;border-radius:4px\">DEBUG: ${j.debug}</div>`;
        res.innerHTML = html;
      }
    } catch(e) {
      res.innerHTML = `<span style=\"color:#f87171\">请求失败: ${e.message}</span>`;
    } finally {
      btn.disabled = false;
      btn.textContent = '登录';
    }
  };

  // 退出登录
  document.getElementById('btnLogout').onclick = async () => {
    if (!confirm('确定退出登录？将清除已保存的 token。')) return;
    await fetch(API + '/logout', {method:'POST'});
    sessionStorage.removeItem('tokenStatus');
    location.reload();
  };
}

renderSettings();</script>
</body>
