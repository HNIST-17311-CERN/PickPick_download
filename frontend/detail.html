<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>哔咔漫画 - 详情</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="topbar">
  <h1>📚 哔咔漫画</h1>
  <nav id="topnav"></nav>
  <span style="flex:1"></span>
  <span id="searchWrap" style="display:flex;align-items:center"></span>
  <span id="tokenStatus" style="font-size:.75em;color:#666;white-space:nowrap;margin-left:12px"></span>
</div>

<div class="container" id="app">
  <div class="loading">加载中...</div>
</div>

<script src="js/common.js?v=9"></script>
<script>
const app = document.getElementById('app');
renderTopbar('');

async function renderDetail(folder) {
  try {
  const data = await fetchJSON(`${API}/comics/${encodeURIComponent(folder)}`);
  const m = data.meta || {};
  const chs = data.chapters || [];
  const firstCh = chs.length > 0 ? chs[0].order : 1;

  app.innerHTML = `
    <button class="btn-back" onclick="history.back()">← 返回</button>
    <div class="detail-header">
      ${data.has_cover ? `<img src="${BASE}/images/${encodeURIComponent(folder)}/cover.jpg" alt="">` : ''}
      <div class="meta">
        <h2>${m.title || folder}</h2>
        <p>作者: <a href="search.html?keyword=${encodeURIComponent(m.author||'')}" style="color:#60a5fa;text-decoration:none" onmouseover="this.style.textDecoration='underline'" onmouseout="this.style.textDecoration='none'">${m.author||'?'}</a> | ${m.status||'连载中'}</p>
        <p>${m.pagesCount||0}P | ${m.epsCount||0}话 | 👁 ${(m.totalViews||0).toLocaleString()} | ❤️ ${(m.totalLikes||0).toLocaleString()}</p>
        ${m.categories ? `<p>分类: ${m.categories.map(c => '<a href="search.html?keyword='+encodeURIComponent(c)+'" style="color:#60a5fa;text-decoration:none" onmouseover="this.style.textDecoration=\'underline\'" onmouseout="this.style.textDecoration=\'none\'">'+c+'</a>').join(', ')}</p>` : ''}
        ${m.tags ? `<p>标签: ${m.tags.slice(0,15).map(t => '<a href="search.html?keyword='+encodeURIComponent(t)+'" style="color:#94a3b8;text-decoration:none" onmouseover="this.style.textDecoration=\'underline\'" onmouseout="this.style.textDecoration=\'none\'">'+t+'</a>').join(', ')}</p>` : ''}
        <div style="display:flex;gap:8px;margin-top:8px">
          ${chs.length > 0 ? `<button class="btn btn-primary" onclick="goReader('reader.html?folder=${encodeURIComponent(folder)}&order=${firstCh}')">▶ 开始阅读</button>` : ''}
          <button id="btnDelete" class="btn" style="background:#333;color:#f87171">🗑 删除</button>
        </div>
      </div>
    </div>
    ${m.description ? `<div class="desc">${m.description}</div>` : ''}
    ${chs.length > 0 ? `
      <h3 style="margin-bottom:8px">📑 章节列表 (${chs.length}话)</h3>
      <div class="chapter-grid">
        ${chs.map(ch => {
          const total = ch.totalPages || 0;
          const done = ch.downloaded || 0;
          const pct = total ? Math.round(done/total*100) : 0;
          const showStatus = _loadState('chStatus', {on: true}).on;
          const cls = !showStatus ? '' : ch.error ? 'has-err' : total && done >= total ? 'ch-done' : done > 0 ? 'ch-partial' : 'ch-none';
          return `
          <div class="chapter-card ${cls}" onclick="goReader('reader.html?folder=${encodeURIComponent(folder)}&order=${ch.order}')">
            <div class="name">${ch.title||'第'+ch.order+'话'}</div>
            ${total ? `<div class="bar"><div style="width:${pct}%"></div></div><div class="pct">${done}/${total}P</div>` : '<div class="pct" style="color:#555">暂无数据</div>'}
            ${ch.error ? `<div class="err">⚠ ${ch.error}</div>` : ''}
          </div>`;
        }).join('')}
      </div>
    ` : '<div class="empty">暂无章节数据</div>'}
    <div id="similarSection" style="margin-top:24px"><div style="color:#555;font-size:.85em">加载相似推荐...</div></div>
  `;

  document.getElementById('btnDelete').onclick = async () => {
    if (!confirm('确定删除「' + (m.title||folder) + '」？')) return;
    const res = await fetch(API + '/comics/' + encodeURIComponent(folder), {method:'DELETE'});
    if (res.ok) { alert('已删除'); location.href = 'index.html'; }
    else alert('删除失败');
  };

  loadSimilar(folder);
  } catch(e) {
    app.innerHTML = '<div class="loading" style="color:#f87171">加载失败: ' + e.message + '</div>';
  }
}

async function loadSimilar(folder) {
  const sec = document.getElementById('similarSection');
  if (!sec) return;
  const cfg = await fetchJSON(`${API}/config`);
  if (cfg.similar_enabled === false) { sec.innerHTML = ''; return; }
  await refreshSimilar(folder);
}

let _similarCache = [];
let _similarPage = 0;

async function refreshSimilar(folder) {
  const sec = document.getElementById('similarSection');
  try {
    const data = await fetchJSON(`${API}/similar/${encodeURIComponent(folder)}?top_k=18`);
    if (!data.items || data.items.length === 0) {
      sec.innerHTML = '<div style="color:#555;font-size:.85em">暂无相似推荐，请到 <a href="settings.html" style="color:#60a5fa">设置页</a> 同步向量库</div>';
      return;
    }
    _similarCache = data.items;
    _similarPage = 0;
    window._similarFolder = folder;
    renderSimilarRow();
  } catch(e) {
    sec.innerHTML = '<div style="color:#555;font-size:.85em">相似推荐加载失败，请到 <a href="settings.html" style="color:#60a5fa">设置页</a> 同步向量库</div>';
  }
}

function renderSimilarRow() {
  const sec = document.getElementById('similarSection');
  const total = _similarCache.length;
  const perPage = 6;
  const pages = Math.ceil(total / perPage);
  const start = _similarPage * perPage;
  const items = _similarCache.slice(start, start + perPage);
  sec.innerHTML = `
    <div style="display:flex;align-items:center;margin-bottom:12px;gap:8px">
      <h3 style="margin:0">🔗 相似推荐</h3>
      <button class="btn" style="background:#333;color:#60a5fa;font-size:.75em;padding:4px 12px;margin-left:auto" onclick="nextSimilarPage()">🔄 换一换</button>
    </div>
    <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:12px">
      ${items.map(item => `
        <div class="card" onclick="location.href='detail.html?folder=${encodeURIComponent(item.folder)}'" style="cursor:pointer">
          ${item.has_cover
            ? `<img src="${BASE}/images/${encodeURIComponent(item.folder)}/cover.jpg" alt="" style="width:100%;aspect-ratio:3/4;object-fit:cover;border-radius:4px" onerror="this.style.display='none'">`
            : '<div style="width:100%;aspect-ratio:3/4;background:#111;border-radius:4px;display:flex;align-items:center;justify-content:center;color:#555;font-size:.7em">无封面</div>'}
          <div class="info" style="padding:6px 4px">
            <div class="title" style="font-size:.8em;line-height:1.3">${item.title}</div>
            <div class="meta" style="font-size:.7em">${item.author||''}</div>
          </div>
        </div>
      `).join('')}
    </div>`;
}

function nextSimilarPage() {
  const pages = Math.ceil(_similarCache.length / 6);
  _similarPage = (_similarPage + 1) % pages;
  renderSimilarRow();
}

(function(){
  const p = new URLSearchParams(location.search);
  const id = p.get('id') || p.get('folder');
  if (id) renderDetail(decodeURIComponent(id));
  else app.innerHTML = '<div class="empty">缺少漫画ID参数</div>';
})();
</script>
</body>
</html>
