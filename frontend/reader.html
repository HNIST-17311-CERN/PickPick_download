<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>PicaDownload - 阅读器</title>
<link rel="stylesheet" href="css/theme.css?v=4">
  <link rel="stylesheet" href="css/style.css">
<style>
  #btnBackTop {
    position: fixed; bottom: 24px; right: 24px;
    width: 44px; height: 44px; border-radius: 50%;
    background: #2563eb; color: #fff; border: none;
    font-size: 1.2em; cursor: pointer; z-index: 999;
    display: none; align-items: center; justify-content: center;
    box-shadow: 0 2px 12px rgba(0,0,0,.4);
    transition: transform .2s, opacity .2s;
  }
  #btnBackTop:hover { transform: scale(1.1); }

  .topbar { display: none !important; }

  /* ==== 专注模式 ==== */
  body.focus-mode .topbar { display: none !important; }
  body.focus-mode .btn-back { display: none !important; }
  body.focus-mode .reader-toolbar > * { display: none !important; }
  body.focus-mode .reader-toolbar > #btnNextCh,
  body.focus-mode .reader-toolbar > #btnPrevCh,
  body.focus-mode .reader-toolbar > #btnFocus { display: inline-block !important; }
  body.focus-mode .reader-toolbar > #btnNextCh,
  body.focus-mode .reader-toolbar > #btnPrevCh { background: transparent; border-color: transparent; color: #666; }
  #btnFocus.on { background: transparent; border-color: transparent; color: #666; }
  body.focus-mode #btnBackTop { display: none !important; }
  body.focus-mode .container { padding: 0 8px !important; }
  .focus-mode, .focus-mode * { scrollbar-width: none; -ms-overflow-style: none; }
  .focus-mode::-webkit-scrollbar,
  .focus-mode *::-webkit-scrollbar { display: none; }
</style>
</head>
<body>

<div class="topbar">
  <h1><span style="color:#000;font-weight:800;font-size:1.4em">Pica</span><span style="color:#fff;font-weight:800;font-size:1.4em">Download</span></h1>
  <nav id="topnav"></nav>
  <span style="flex:1"></span>
  <span id="searchWrap" style="display:flex;align-items:center"></span>
  <span id="tokenStatus" style="font-size:.75em;color:#666;white-space:nowrap;margin-left:12px"></span>
</div>

<div class="container" id="app">
  <div class="loading">加载中...</div>
</div>

<button id="btnBackTop" title="回到顶部">⬆</button>

<script src="js/common.js?v=20"></script>
<script>
const app = document.getElementById('app');
renderTopbar('');

async function renderReader(folder, order) {
  window.scrollTo(0, 0);
  const data = await fetchJSON(`${API}/comics/${encodeURIComponent(folder)}`);
  const chs = data.chapters || [];
  const ch = chs.find(c => c.order === order) || {};
  const imgData = await fetchJSON(`${API}/comics/${encodeURIComponent(folder)}/chapters/${order}`);
  const images = imgData.images || [];
  const qs = new URLSearchParams(location.search);
  const mode = qs.get('mode') || 'scroll';
  const zoom = parseInt(qs.get('zoom')) || 33;
  const focus = qs.get('focus') === '1';

  const chOptions = chs.map(c =>
    `<option value="${c.order}" ${c.order===order?'selected':''}>第${String(c.order).padStart(2,'0')}话 - ${c.title||''}</option>`
  ).join('');

  const chIdx = chs.findIndex(c => c.order === order);

  app.innerHTML = `
    <button class="btn-back" onclick="if(window.parent!==window){window.parent.postMessage({type:'closeReader'},'*')}else{location.replace('detail.html?id=${encodeURIComponent(folder)}')}">← 返回详情</button>
    <div class="reader-toolbar">
      <select id="chSelect">${chOptions}</select>
      <span style="color:#888;font-size:.85em">${images.length} 张</span>
      <button id="btnPrevCh" ${chIdx<=0?'disabled':''}>⬅ 上一话</button>
      <button id="btnNextCh" ${chIdx>=chs.length-1?'disabled':''}>下一话 ➡</button>
      <span class="spacer"></span>
      <button id="btnFS" title="全屏">⛶</button>
      <button id="btnFocus">专注 F</button>
      <div class="zoom-bar">
        <button id="z33" class="${zoom===33?'on':''}">33%</button>
        <button id="z50" class="${zoom===50?'on':''}">50%</button>
        <button id="z75" class="${zoom===75?'on':''}">75%</button>
        <button id="z100" class="${zoom===100?'on':''}" title="手机推荐">100%<span style="font-size:.65em;display:block;line-height:1">手机</span></button>
        <input id="zSlider" type="range" min="10" max="200" value="${zoom}" style="width:80px;accent-color:#2563eb"><span id="zVal" style="color:#aaa;font-size:.75em;min-width:36px;text-align:right">${zoom}%</span>
      </div>
      <div class="mode-switch">
        <button id="btnScroll" class="${mode==='scroll'?'on':''}">📜 滚动</button>
        <button id="btnFlip" class="${mode==='flip'?'on':''}">📖 翻页</button>
      </div>
    </div>
    <div id="readerArea">
      ${images.length === 0 ? '<div class="empty">该章节暂无图片</div>' : ''}
    </div>
  `;

  const readerArea = document.getElementById('readerArea');
  const sizeCss = zoom === 100 ? 'width:100%' : `width:${zoom}%`;
  const buildUrl = (o, m, z) => `reader.html?folder=${encodeURIComponent(folder)}&order=${o}&mode=${m}&zoom=${z}${focus?'&focus=1':''}`;

  function renderScroll() {
    const hasPrev = chIdx > 0;
    const prevCh = hasPrev ? chs[chIdx - 1] : null;
    const hasNext = chIdx < chs.length - 1;
    const nextCh = hasNext ? chs[chIdx + 1] : null;

    readerArea.innerHTML = '';
    const container = document.createElement('div');
    container.className = 'scroll-mode';

    for (const img of images) {
      const el = document.createElement('img');
      el.src = resolveUrl(img.url);
      el.alt = img.filename;
      el.loading = 'lazy';
      el.style.cssText = sizeCss;
      container.appendChild(el);
    }

    if (hasPrev || hasNext) {
      const nav = document.createElement('div');
      nav.style.cssText = 'text-align:center;padding:24px 0;display:flex;justify-content:center;gap:16px';
      if (hasPrev) {
        const btn = document.createElement('button');
        btn.className = 'btn btn-primary';
        btn.style.cssText = 'padding:12px 32px;font-size:1em';
        btn.textContent = '\u2B05 \u4E0A\u4E00\u8BDD\uFF1A' + (prevCh.title || ('\u7B2C' + prevCh.order + '\u8BDD'));
        btn.onclick = () => goReader(buildUrl(prevCh.order, mode, zoom));
        nav.appendChild(btn);
      }
      if (hasNext) {
        const btn = document.createElement('button');
        btn.className = 'btn btn-primary';
        btn.style.cssText = 'padding:12px 32px;font-size:1em';
        btn.textContent = '\u27A1 \u4E0B\u4E00\u8BDD\uFF1A' + (nextCh.title || ('\u7B2C' + nextCh.order + '\u8BDD'));
        btn.onclick = () => goReader(buildUrl(nextCh.order, mode, zoom));
        nav.appendChild(btn);
      }
      container.appendChild(nav);
    }

    readerArea.appendChild(container);
  }

  function renderFlip() {
    let page = 0;
    function show() {
      page = Math.max(0, Math.min(page, images.length-1));
      readerArea.innerHTML = `
        <div class="flip-mode">
          <img src="${resolveUrl(images[page].url)}" alt="${images[page].filename}" style="${zoom===100?'max-width:100%':'max-width:'+zoom+'vw'};max-height:85vh">
          <div class="flip-nav">
            <button id="btnFL" ${page<=0?'disabled':''}>◀</button>
            <span class="page-num">${page+1} / ${images.length}</span>
            <button id="btnFR" ${page>=images.length-1?'disabled':''}>▶</button>
          </div>
          <div class="page-jump">
            跳转到 <input type="number" id="jumpInput" value="${page+1}" min="1" max="${images.length}"> / ${images.length} 页
          </div>
          <div class="kbd-hint">← → 翻页　↑ ↓ 切换话</div>
        </div>`;
      document.getElementById('btnFL').onclick = () => { page--; show(); };
      document.getElementById('btnFR').onclick = () => { page++; show(); };
      const ji = document.getElementById('jumpInput');
      if (ji) ji.onchange = () => { page = +ji.value - 1; show(); };
      window._flip = (delta) => { page += delta; show(); };
    }
    show();
  }

  if (mode === 'flip') renderFlip(); else renderScroll();

  // ==== 全屏 ====
  const inFrame = window.parent !== window;
  function enterFS() {
    if (inFrame) {
      window.parent.document.documentElement.requestFullscreen().catch(()=>{});
    } else if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().catch(()=>{});
    }
  }
  function exitFS() {
    if (inFrame) {
      window.parent.document.exitFullscreen();
    } else if (document.fullscreenElement) {
      document.exitFullscreen();
    }
  }
  document.getElementById('btnFS').onclick = () => {
    if (inFrame) {
      // 在 iframe 中：检查父窗口全屏状态
      window.parent.document.fullscreenElement ? exitFS() : enterFS();
    } else {
      document.fullscreenElement ? exitFS() : enterFS();
    }
  };

  // ==== 专注模式 ====
  function applyFocus(on) {
    document.documentElement.classList.toggle('focus-mode', on);
    document.body.classList.toggle('focus-mode', on);
    const btn = document.getElementById('btnFocus');
    if (btn) btn.classList.toggle('on', on);
  }
  applyFocus(focus);
  function toggleFocus() {
    const next = !document.body.classList.contains('focus-mode');
    applyFocus(next);
    const url = new URL(location.href);
    if (next) url.searchParams.set('focus', '1'); else url.searchParams.delete('focus');
    history.replaceState(null, '', url);
  }
  document.getElementById('btnFocus').onclick = toggleFocus;
  // F 键切换专注模式 + 方向键导航
  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
    if (e.key === 'f' || e.key === 'F') {
      toggleFocus();
      return;
    }
    // 翻页模式：← → 翻页，↑ ↓ 切换话
    if (mode === 'flip') {
      if (e.key === 'ArrowLeft') { e.preventDefault(); window._flip && window._flip(-1); }
      else if (e.key === 'ArrowRight') { e.preventDefault(); window._flip && window._flip(1); }
      else if (e.key === 'ArrowUp' && chIdx > 0) goReader(buildUrl(chs[chIdx-1].order, mode, zoom));
      else if (e.key === 'ArrowDown' && chIdx < chs.length - 1) goReader(buildUrl(chs[chIdx+1].order, mode, zoom));
    }
    // 滚动模式：← → 切换话
    if (mode === 'scroll') {
      if (e.key === 'ArrowLeft' && chIdx > 0) goReader(buildUrl(chs[chIdx-1].order, mode, zoom));
      else if (e.key === 'ArrowRight' && chIdx < chs.length - 1) goReader(buildUrl(chs[chIdx+1].order, mode, zoom));
    }
  });

  // ==== 回到顶部按钮 ====
  const btnTop = document.getElementById('btnBackTop');
  btnTop.onclick = () => { window.scrollTo({ top: 0, behavior: 'smooth' }); };
  function updateBackTop() {
    btnTop.style.display = window.scrollY > 600 ? 'flex' : 'none';
  }
  window.addEventListener('scroll', updateBackTop, { passive: true });
  updateBackTop();

  // 章节切换 — 全部通过 goReader 保证全屏状态保持
  document.getElementById('chSelect').onchange = function() {
    goReader(buildUrl(this.value, mode, zoom));
  };
  document.getElementById('btnPrevCh').onclick = () => {
    const prev = chs[chIdx-1];
    if (prev) goReader(buildUrl(prev.order, mode, zoom));
  };
  document.getElementById('btnNextCh').onclick = () => {
    const next = chs[chIdx+1];
    if (next) goReader(buildUrl(next.order, mode, zoom));
  };
  document.getElementById('btnScroll').onclick = () => {
    goReader(buildUrl(order, 'scroll', zoom));
  };
  document.getElementById('btnFlip').onclick = () => {
    goReader(buildUrl(order, 'flip', zoom));
  };
  // 缩放
  [33,50,75,100].forEach(z => {
    const btn = document.getElementById('z'+z);
    if (btn) btn.onclick = () => { goReader(buildUrl(order, mode, z)); };
  });
  const zSlider = document.getElementById('zSlider');
  if (zSlider) {
    const zVal = document.getElementById('zVal');
      zSlider.oninput = () => {
        const z = zSlider.value;
        if (zVal) zVal.textContent = z + '%';
        const pct = z === '100' ? '100%' : z + '%';
        const vw = z === '100' ? '100vw' : z + 'vw';
        document.querySelectorAll('#readerArea img').forEach(img => {
          img.style.width = pct;
          img.style.maxWidth = vw;
        });
      };
    zSlider.onchange = () => {
      goReader(buildUrl(order, mode, +zSlider.value));
    };
  }
}

(function(){
  // 自动全屏 — 仅直接打开 reader.html 时需要（从详情页进入走 goReader iframe 方案）
  function tryFS() {
    if (!document.fullscreenElement && window.parent === window) {
      document.documentElement.requestFullscreen().catch(()=>{});
    }
  }
  // 同步尝试（部分浏览器导航后保留手势令牌）
  tryFS();
  // 兜底：首次点击或按键
  if (!document.fullscreenElement) {
    function fallback(e) {
      if (e.target.id === 'btnFS' || (e.target.closest && e.target.closest('#btnFS'))) return;
      tryFS();
    }
    document.addEventListener('click', fallback, { once: true });
    document.addEventListener('keydown', fallback, { once: true });
  }

  const params = new URLSearchParams(location.search);
  const folder = params.get('folder') || '';
  const order = parseInt(params.get('order')) || 1;
  if (folder) renderReader(decodeURIComponent(folder), order);
  else app.innerHTML = '<div class="empty">缺少参数</div>';
})();</script>
</body>
</html>
