<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PicaDownload - 详情</title>
<link rel="stylesheet" href="css/theme.css?v=4">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="topbar">
  <h1><span style="color:#000;font-weight:800;font-size:1.4em">Pica</span><span style="color:#fff;font-weight:800;font-size:1.4em">Download</span></h1>
  <nav id="topnav"></nav>
  <span style="flex:1"></span>
  <span id="searchWrap" style="display:flex;align-items:center"></span>
  <span id="tokenStatus" style="font-size:.75em;color:#666;white-space:nowrap;margin-left:12px"></span>
</div>

<div class="container" id="app">
  <div class="loading">加载中...</div>
</div>

<script src="js/common.js?v=20"></script>
<script>
const app = document.getElementById('app');
renderTopbar('');

async function renderDetail(comicId) {
  try {
    const data = await fetchJSON(`${API}/comics/${encodeURIComponent(comicId)}`);
    const m = data.meta || {};
    if (m._id) { fetch(API+'/mark-seen', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({comic_id: m._id})}); }
    const chs = data.chapters || [];
    const cover = data.cover_url || '';

    app.innerHTML = `
      <button class="btn-back" onclick="history.back()">← 返回</button>
      <div class="detail-header">
        ${cover ? `<img src="${resolveUrl(cover)}" alt="">` : ''}
        <div class="meta">
          <h2>${m.title || '?'}</h2>
          <p>作者: <a href="search.html?keyword=${encodeURIComponent(m.author||'')}" style="color:#60a5fa;text-decoration:none" onmouseover="this.style.textDecoration='underline'" onmouseout="this.style.textDecoration='none'">${m.author||'?'}</a> | ${m.chineseTeam ? '汉化: '+m.chineseTeam+' | ' : ''}${m.status||'?'}</p>
          <p>${m.pagesCount||0}P | ${m.epsCount||0}话 | <svg style="width:1em;height:1em;vertical-align:-.15em;margin-right:1px" viewBox="0 0 576 512"><path d="M572.52 241.4C518.29 135.59 410.93 64 288 64S57.68 135.64 3.48 241.41a32.35 32.35 0 0 0 0 29.19C57.71 376.41 165.07 448 288 448s230.32-71.64 284.52-177.41a32.35 32.35 0 0 0 0-29.19zM288 400a144 144 0 1 1 144-144 143.93 143.93 0 0 1-144 144zm0-240a95.31 95.31 0 0 0-25.31 3.79 47.85 47.85 0 0 1-66.9 66.9A95.78 95.78 0 1 0 288 160z" fill="currentColor"/></svg> ${(m.totalViews||0).toLocaleString()} | ❤️ ${(m.totalLikes||0).toLocaleString()}</p>
          ${m.categories ? `<p>分类: ${m.categories.map(c => '<a href="search.html?keyword='+encodeURIComponent(c)+'" style="color:#60a5fa;text-decoration:none" onmouseover="this.style.textDecoration=\'underline\'" onmouseout="this.style.textDecoration=\'none\'">'+c+'</a>').join(', ')}</p>` : ''}
          ${m.tags ? `<p>标签: ${m.tags.slice(0,15).map(t => '<a href="search.html?keyword='+encodeURIComponent(t)+'" style="color:#94a3b8;text-decoration:none" onmouseover="this.style.textDecoration=\'underline\'" onmouseout="this.style.textDecoration=\'none\'">'+t+'</a>').join(', ')}</p>` : ''}
          <div style="display:flex;gap:8px;margin-top:8px">
            ${data.is_downloaded
              ? `<a href="detail.html?folder=${encodeURIComponent(data.local_folder)}" class="btn btn-primary" style="text-decoration:none">📖 本地阅读</a><button class="btn" style="background:#2a2a2a;color:#555;cursor:not-allowed" disabled>⬇ 已下载</button>`
              : '<button id="btnDownload" class="btn btn-primary">⬇ 下载</button>'}
            ${!data.is_favourited ? '<button id="btnFav" class="btn" style="background:#e11d48;color:#fff">❤️ 收藏</button>' : ''}
          </div>
        </div>
      </div>
      ${m.description ? `<div class="desc">${m.description}</div>` : ''}
      ${chs.length > 0 ? `
        <h3 style="margin-bottom:8px"><svg style="width:18px;height:18px;vertical-align:-4px;margin-right:4px" stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>章节列表 (${chs.length}话)</h3>
        <div class="chapter-grid">
          ${chs.map(ch => {
            const cls = ch.error ? 'ch-error' : ch.totalPages > 0 && ch.downloaded >= ch.totalPages ? 'ch-done' : ch.downloaded > 0 ? 'ch-partial' : 'ch-none';
            const st = ch.error ? '下载失败' : ch.totalPages > 0
              ? (ch.downloaded >= ch.totalPages ? '已下载' : ch.downloaded + '/' + ch.totalPages + 'P')
              : '未下载';
            return `
            <div class="chapter-card ${cls}">
              <div class="name">${ch.title||'第'+ch.order+'话'}</div>
              <div class="pct">${st}</div>
            </div>`;
          }).join('')}
        </div>
      ` : '<div class="empty">暂无章节数据</div>'}
    `;

    const btnDownload = document.getElementById('btnDownload');
    const btnFav = document.getElementById('btnFav');
    if (btnFav) {
      btnFav.onclick = async () => {
        btnFav.disabled = true;
        btnFav.textContent = '收藏中...';
        try {
          const r = await fetch(API + '/favourite', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({comic_id: m._id})});
          if (r.ok) {
            btnFav.remove();
          } else { alert('收藏失败'); btnFav.disabled = false; btnFav.textContent = '❤️ 收藏'; }
        } catch(e) { alert('请求失败: ' + e.message); btnFav.disabled = false; btnFav.textContent = '❤️ 收藏'; }
      };
    }
    if (btnDownload) {
      btnDownload.onclick = async function() {
      var cid = m._id;
      if (!cid) { alert('无法获取漫画信息'); return; }
      btnDownload.textContent = '加入中...';
      btnDownload.disabled = true;
      try {
        await fetch(API + '/download/queue/add', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({comic_id: cid})
        });
        var st = await fetchJSON(API + '/download/status');
        if (st.running) {
          btnDownload.textContent = '✅ 已加入队列';
          btnDownload.style.background = '#333';
          btnDownload.style.color = '#4ade80';
        } else {
          var r = await fetch(API + '/download/start', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({use_queue: true, page_concurrency: 80, chapter_concurrency: 2, comic_concurrency: 1})
          });
          if (r.ok) {
            btnDownload.textContent = '✅ 下载已启动';
          } else {
            btnDownload.textContent = '✅ 已加入队列';
            btnDownload.style.background = '#333';
            btnDownload.style.color = '#4ade80';
          }
        }
      } catch(e) {
        alert('请求失败: ' + e.message);
        btnDownload.textContent = '⬇ 下载';
        btnDownload.disabled = false;
      }
    };
    }
  } catch(e) {
    app.innerHTML = '<div class="empty">加载失败: ' + e.message + '</div>';
  }
}

(function(){
  const id = new URLSearchParams(location.search).get('id');
  if (id) renderDetail(decodeURIComponent(id));
  else app.innerHTML = '<div class="empty">缺少漫画ID参数</div>';
})();
</script>
</body>
</html>
